repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=25600"]
      - id: check-yaml
      - id: check-json
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: client-eslint
        name: eslint (client)
        language: system
        files: ^client/.*\.(ts|tsx|js|jsx)$
        entry: bash -c 'cd client && npx --no-install eslint "${@#client/}"' --
        require_serial: true

      - id: client-tsc
        name: tsc (client)
        language: system
        files: ^client/.*\.(ts|tsx)$
        pass_filenames: false
        entry: bash -c 'cd client && npx --no-install tsc -b --noEmit'

      - id: server-tsc
        name: tsc (server)
        language: system
        files: ^server/.*\.ts$
        pass_filenames: false
        entry: bash -c 'cd server && npx --no-install tsc --noEmit'
